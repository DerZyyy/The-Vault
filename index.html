<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Erişim Paneli</title>
    <style>
        body {
            background-color: #0d0d0d; color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .login-box {
            text-align: center; border: 1px solid #222; padding: 40px;
            background-color: #141414; box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
        }
        input {
            background-color: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 12px; font-size: 16px; text-align: center; outline: none; margin-bottom: 20px;
        }
        button {
            background-color: #222; border: 1px solid #444; color: #aaa; padding: 10px 25px; cursor: pointer;
        }
        button:hover { background-color: #333; color: #fff; }
        .error { color: #aa4444; margin-top: 15px; font-size: 13px; height: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>SİSTEM ERİŞİMİ</h2>
    <input type="password" id="passwordInput" placeholder="Erişim kodu" onkeydown="if(event.key === 'Enter') checkPassword()">
    <br>
    <button onclick="checkPassword()">Doğrula</button>
    <div id="errorMessage" class="error"></div>
</div>

<script>
function checkPassword() {
    const password = document.getElementById("passwordInput").value.trim();
    const errorElement = document.getElementById("errorMessage");

    if (password === "esat2008" || password === "efehan2008") {
        sessionStorage.setItem("userRole", password);
        window.location.href = "AnaSayfa/";
    } else {
        errorElement.innerText = "Erişim kodu sistemde bulunamadı.";
    }
}
</script>

</body>
</html>
